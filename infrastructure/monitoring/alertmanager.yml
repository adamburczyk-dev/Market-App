global:
  resolve_timeout: 5m
  # Telegram — uzupełnij w .env
  # slack_api_url: ${SLACK_WEBHOOK_URL}

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      repeat_interval: 1h

receivers:
  - name: "default"
    # Placeholder — dodaj webhook/telegram/slack
    webhook_configs: []

  - name: "critical-alerts"
    webhook_configs:
      - url: "${ALERTMANAGER_WEBHOOK_URL:-http://notification:8000/alerts/webhook}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "service"]
