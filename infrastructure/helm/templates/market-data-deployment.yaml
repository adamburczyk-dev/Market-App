{{- if .Values.marketData.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data
  labels:
    app: market-data
    {{- include "trading.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.marketData.replicaCount }}
  selector:
    matchLabels:
      app: market-data
  template:
    metadata:
      labels:
        app: market-data
      annotations:
        {{- include "trading.prometheusAnnotations" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: market-data
          image: {{ include "trading.image" (dict "values" .Values.marketData "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.marketData.port }}
              name: http
          env:
            - name: SERVICE_NAME
              value: market-data
            - name: LOG_LEVEL
              value: {{ .Values.marketData.env.LOG_LEVEL | default "INFO" | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: redis-password
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.marketData.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: market-data
  labels:
    app: market-data
spec:
  selector:
    app: market-data
  ports:
    - port: 8000
      targetPort: http
      name: http
{{- end }}
