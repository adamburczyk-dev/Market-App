apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-system-ingress
  labels:
    {{- include "trading.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: trading.local   # Zmień na domenę produkcyjną
      http:
        paths:
          - path: /api/v1/market-data
            pathType: Prefix
            backend:
              service:
                name: market-data
                port:
                  number: 8000
          - path: /api/v1/features
            pathType: Prefix
            backend:
              service:
                name: feature-engine
                port:
                  number: 8000
          - path: /api/v1/strategy
            pathType: Prefix
            backend:
              service:
                name: strategy
                port:
                  number: 8000
          - path: /api/v1/backtest
            pathType: Prefix
            backend:
              service:
                name: backtest
                port:
                  number: 8000
