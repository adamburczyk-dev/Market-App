{{/*
API-gateway routes for every enabled service — mirrors the docker-compose
Traefik labels (PathPrefix /api/v1/<service-name> -> service).
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-system-ingress
  labels:
    {{- include "trading.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: trading.local   # Zmień na domenę produkcyjną
      http:
        paths:
          {{- range $name, $svc := .Values.services }}
          {{- if $svc.enabled }}
          - path: /api/v1/{{ $name }}
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: 8000
          {{- end }}
          {{- end }}
