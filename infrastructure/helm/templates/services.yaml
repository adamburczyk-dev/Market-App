{{/*
Generic Deployment + Service for every application microservice.

Ranges over .Values.services (kebab-case key = k8s name = compose service
name). Common env is injected here (SERVICE_NAME, NATS_URL, REDIS_HOST,
REDIS_PASSWORD secret, LOG_LEVEL with an INFO default); everything
service-specific (inter-service URLs, DB coordinates) lives in the entry's
`env` map so it stays in sync with docker-compose. `needsDb: true` adds the
DB_PASSWORD secret ref (market-data).
*/}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
    {{- include "trading.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
      annotations:
        {{- include "trading.prometheusAnnotations" $ | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: {{ $name }}
          image: {{ include "trading.image" (dict "values" $svc "global" $.Values.global) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port | default 8000 }}
              name: http
          env:
            - name: SERVICE_NAME
              value: {{ $name }}
            - name: LOG_LEVEL
              value: {{ ($svc.env | default dict).LOG_LEVEL | default "INFO" | quote }}
            - name: NATS_URL
              value: nats://nats:4222
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: redis-password
            {{- if $svc.needsDb }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: db-password
            {{- end }}
            {{- range $key, $value := omit ($svc.env | default dict) "LOG_LEVEL" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - port: 8000
      targetPort: http
      name: http
{{- end }}
{{- end }}
