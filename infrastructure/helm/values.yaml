global:
  imagePullPolicy: IfNotPresent
  env: development
  imageRegistry: ghcr.io/your-org/trading-system

# ==================== APPLICATION SERVICES ====================

marketData:
  enabled: true
  replicaCount: 1
  image:
    name: market-data
    tag: latest
  port: 8000
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  env:
    LOG_LEVEL: INFO

featureEngine:
  enabled: true
  replicaCount: 1
  image:
    name: feature-engine
    tag: latest
  port: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  env:
    LOG_LEVEL: INFO

strategy:
  enabled: true
  replicaCount: 1
  image:
    name: strategy
    tag: latest
  port: 8000
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

backtest:
  enabled: true
  replicaCount: 1
  image:
    name: backtest
    tag: latest
  port: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

mlPipeline:
  enabled: false   # Włącz w fazie 3
  replicaCount: 1
  image:
    name: ml-pipeline
    tag: latest
  port: 8000
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

riskMgmt:
  enabled: false   # Włącz w fazie 4
  replicaCount: 1
  image:
    name: risk-mgmt
    tag: latest
  port: 8000

execution:
  enabled: false   # Włącz w fazie 5
  replicaCount: 1
  image:
    name: execution
    tag: latest
  port: 8000

notification:
  enabled: false   # Włącz w fazie 5
  replicaCount: 1
  image:
    name: notification
    tag: latest
  port: 8000

dashboard:
  enabled: false   # Włącz w fazie 4
  replicaCount: 1
  image:
    name: dashboard
    tag: latest
  port: 8501

# ==================== INFRASTRUCTURE ====================

postgres:
  enabled: true
  image: timescale/timescaledb:latest-pg16
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

redis:
  enabled: true
  image: redis:7-alpine
  storage: 1Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

nats:
  enabled: true
  image: nats:2-alpine
  storage: 2Gi

prometheus:
  enabled: true
  image: prom/prometheus:latest
  storage: 20Gi
  retention: 30d

grafana:
  enabled: true
  image: grafana/grafana:latest
  storage: 1Gi

loki:
  enabled: true
  image: grafana/loki:latest
  storage: 10Gi

traefik:
  enabled: true
  image: traefik:v3.0

# ==================== SECRETS ====================
# W produkcji: użyj Kubernetes Secrets lub External Secrets Operator
secrets:
  dbPassword: ""       # base64-encoded
  redisPassword: ""    # base64-encoded
  grafanaPassword: ""  # base64-encoded
