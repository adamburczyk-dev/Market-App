global:
  imagePullPolicy: IfNotPresent
  env: development
  imageRegistry: ghcr.io/your-org/trading-system

# ==================== APPLICATION SERVICES ====================
# One entry per microservice; templates/services.yaml ranges over this map and
# renders a Deployment + Service for every enabled entry (kebab-case key = the
# k8s name = the compose service name, so inter-service URLs are identical in
# both stacks). `env` mirrors docker-compose (minus infra vars the template
# injects: SERVICE_NAME, NATS_URL, REDIS_HOST, REDIS_PASSWORD). `needsDb: true`
# additionally injects the DB_PASSWORD secret ref.

services:
  market-data:
    enabled: true
    replicaCount: 1
    image:
      name: market-data
      tag: latest
    port: 8000
    needsDb: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO
      DB_HOST: postgres
      DB_NAME: trading_db
      DB_USER: trader

  feature-engine:
    enabled: true
    replicaCount: 1
    image:
      name: feature-engine
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    env:
      LOG_LEVEL: INFO
      MARKET_DATA_URL: http://market-data:8000
      # Tier-2 attribute enrichment (fundamentals announced by fundamentals.updated)
      FUNDAMENTAL_DATA_URL: http://fundamental-data:8000

  strategy:
    enabled: true
    replicaCount: 1
    image:
      name: strategy
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO
      FEATURE_ENGINE_URL: http://feature-engine:8000
      RISK_MGMT_URL: http://risk-mgmt:8000

  backtest:
    enabled: true
    replicaCount: 1
    image:
      name: backtest
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
    env:
      LOG_LEVEL: INFO
      MARKET_DATA_URL: http://market-data:8000

  ml-pipeline:
    enabled: true
    replicaCount: 1
    image:
      name: ml-pipeline
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    env:
      LOG_LEVEL: INFO
      # training pulls history over HTTP; sqlite/artifacts under /app/mlruns —
      # ephemeral without a PVC (retrain after restart), volume is the scale-up
      MARKET_DATA_URL: http://market-data:8000
      MLFLOW_TRACKING_URI: sqlite:////app/mlruns/mlflow.db
      # serving: features.ready → ranked vector + macro regime → ml.signal_generated
      FEATURE_ENGINE_URL: http://feature-engine:8000
      MACRO_DATA_URL: http://macro-data:8000
      # daily monitor pushes realized ML outcomes into the adaptive weights
      SIGNAL_AGGREGATOR_URL: http://signal-aggregator:8000

  risk-mgmt:
    enabled: true
    replicaCount: 1
    image:
      name: risk-mgmt
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO

  execution:
    enabled: true
    replicaCount: 1
    image:
      name: execution
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO
      RISK_MGMT_URL: http://risk-mgmt:8000
      MARKET_DATA_URL: http://market-data:8000

  notification:
    enabled: true
    replicaCount: 1
    image:
      name: notification
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO
      # SLACK_WEBHOOK_URL / TELEGRAM_* / SMTP_* + EMAIL_* are secrets — inject
      # via a Secret in a real deployment; without them the service stays
      # log-only (email needs SMTP_HOST + EMAIL_FROM + EMAIL_TO).

  dashboard:
    enabled: true
    replicaCount: 1
    image:
      name: dashboard
      tag: latest
    port: 8000  # container listens on 8000 (compose maps host 8501 -> 8000)
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO
      RISK_MGMT_URL: http://risk-mgmt:8000
      EXECUTION_URL: http://execution:8000
      NOTIFICATION_URL: http://notification:8000
      ML_PIPELINE_URL: http://ml-pipeline:8000

  # ---------- ML/AI extension (serwisy 10-13) ----------

  fundamental-data:
    enabled: true
    replicaCount: 1
    image:
      name: fundamental-data
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO
      # SEC_USER_AGENT required for live EDGAR fetch; without it the service
      # degrades gracefully to manually-ingested statements.

  macro-data:
    enabled: true
    replicaCount: 1
    image:
      name: macro-data
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO
      # FRED_API_KEY required for live FRED fetch; manual overrides work without.

  company-classifier:
    enabled: true
    replicaCount: 1
    image:
      name: company-classifier
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO

  signal-aggregator:
    enabled: true
    replicaCount: 1
    image:
      name: signal-aggregator
      tag: latest
    port: 8000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
      LOG_LEVEL: INFO
      # sector enrichment for regime-aware sector caps (graceful None when down)
      COMPANY_CLASSIFIER_URL: http://company-classifier:8000

# ==================== INFRASTRUCTURE ====================

postgres:
  enabled: true
  image: timescale/timescaledb:latest-pg16
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

redis:
  enabled: true
  image: redis:7-alpine
  storage: 1Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

nats:
  enabled: true
  image: nats:2-alpine
  storage: 2Gi

prometheus:
  enabled: true
  image: prom/prometheus:latest
  storage: 20Gi
  retention: 30d

grafana:
  enabled: true
  image: grafana/grafana:latest
  storage: 1Gi

loki:
  enabled: true
  image: grafana/loki:latest
  storage: 10Gi

traefik:
  enabled: true
  image: traefik:v3.0

# ==================== SECRETS ====================
# W produkcji: użyj Kubernetes Secrets lub External Secrets Operator
secrets:
  dbPassword: ""       # base64-encoded
  redisPassword: ""    # base64-encoded
  grafanaPassword: ""  # base64-encoded
