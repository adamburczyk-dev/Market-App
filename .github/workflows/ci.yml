name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Wykryj zmienione serwisy (nie testuj wszystkich przy zmianie jednego)
  # ============================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            shared:
              - 'shared/**'
            market-data:
              - 'services/market-data/**'
              - 'shared/**'
            feature-engine:
              - 'services/feature-engine/**'
              - 'shared/**'
            strategy:
              - 'services/strategy/**'
              - 'shared/**'
            backtest:
              - 'services/backtest/**'
              - 'shared/**'
            ml-pipeline:
              - 'services/ml-pipeline/**'
              - 'shared/**'
            risk-mgmt:
              - 'services/risk-mgmt/**'
              - 'shared/**'
            execution:
              - 'services/execution/**'
              - 'shared/**'
            notification:
              - 'services/notification/**'
              - 'shared/**'
            dashboard:
              - 'services/dashboard/**'
              - 'shared/**'

  # ============================================================
  # Testy shared library (wymagana przez wszystkie serwisy)
  # ============================================================
  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e "shared/trading-common[dev]"
      - run: ruff check shared/trading-common/
      - run: mypy shared/trading-common/src/ --ignore-missing-imports
      - run: pytest shared/trading-common/tests/ -v --cov=shared/trading-common/src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          flags: shared

  # ============================================================
  # Testy serwisów (matrix — tylko zmienione serwisy)
  # ============================================================
  test-services:
    needs: [detect-changes, test-shared]
    runs-on: ubuntu-latest
    # Uruchom tylko jeśli detect-changes wykrył co najmniej jeden zmieniony serwis
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    strategy:
      fail-fast: false
      matrix:
        # Dynamiczna macierz — tylko serwisy które się zmieniły (lub zależą od shared)
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install shared lib
        run: pip install -e shared/trading-common
      - name: Install service deps
        # 'shared' nie jest serwisem — pomijamy instalację i testy dla niego
        if: ${{ matrix.service != 'shared' }}
        run: pip install -e "services/${{ matrix.service }}[dev]"
      - name: Lint
        if: ${{ matrix.service != 'shared' }}
        run: ruff check services/${{ matrix.service }}/
      - name: Type check
        if: ${{ matrix.service != 'shared' }}
        run: mypy services/${{ matrix.service }}/src/ --ignore-missing-imports
      - name: Test
        if: ${{ matrix.service != 'shared' }}
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -v --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: ${{ matrix.service != 'shared' }}
        with:
          flags: ${{ matrix.service }}
